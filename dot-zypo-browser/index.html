<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zypo Browser</title>
  <!-- Tailwind and Alpine.js -->
  <link rel="stylesheet" href="dist/tailwind.css">
  <script defer src="dist/alpine.min.js"></script>
  <style>
    body { background-color: black; margin: 0; padding: 0; }
    .drag-region { -webkit-app-region: drag; }
    .no-drag { -webkit-app-region: no-drag; }
    [x-cloak] { display: none !important; }
    
    /* Layout */
    #views-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Reliable Stacking Contexts */
    .top-nav-area { position: relative; z-index: 200; background: black; }
    #tabs-container { position: relative; z-index: 100; background: black; }
    #views-container { position: relative; z-index: 10; }

    /* Dropdown alignment */
    .zypo-dropdown {
      position: absolute !important;
      z-index: 9999 !important;
      top: 100% !important;
      right: 0 !important;
      margin-top: 0.5rem;
    }
    
    .dropdown-backdrop {
      position: fixed;
      inset: 0;
      z-index: 150;
      background: transparent;
    }
  </style>
</head>
<body 
  x-data="browserApp()"
  x-init="init()"
  class="bg-black text-white h-screen w-screen overflow-hidden flex flex-col"
>
  <div class="h-6 w-full drag-region bg-black"></div>
  
  <!-- Navigation Header -->
  <div class="top-nav-area flex items-center p-3 space-x-1.5 no-drag bg-black">
    <div class="flex items-center text-zinc-400">
      <button id="btn-back" @mousedown.stop class="p-2 hover:bg-zinc-800 rounded-full transition-colors">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"></path></svg>
      </button>
      <button id="btn-forward" @mousedown.stop class="p-2 hover:bg-zinc-800 rounded-full transition-colors">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"></path></svg>
      </button>
      <button id="btn-refresh" @mousedown.stop class="p-2 hover:bg-zinc-800 rounded-full transition-colors">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
      </button>
    </div>
    
    <div id="nav-bar-container" class="flex-1 relative">
      <div id="nav-bar" class="w-full bg-[#18181b] border border-zinc-800 rounded-3xl flex items-center px-3 py-1.5 shadow-inner focus-within:border-zinc-600 focus-within:bg-[#27272a] transition-all relative">
        <input id="address-input" type="text" class="bg-transparent outline-none flex-1 text-sm font-medium text-white placeholder-zinc-600 w-full" :placeholder="t('browser.search_placeholder')">
        
        <button id="btn-bookmark" @mousedown.stop class="ml-2 text-zinc-400 hover:text-yellow-400 transition-colors">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"></path></svg>
        </button>
        
        <div class="relative flex items-center">
          <button id="btn-vpn" @click="openVPN()" @mousedown.stop class="ml-2 text-zinc-400 hover:text-blue-500 transition-colors flex items-center" :title="t('browser.vpn_settings')">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
          </button>

          <!-- User Button & Dropdown -->
          <div class="relative">
            <button id="btn-user" @click.stop="userOpen = !userOpen; networkOpen = false; menuOpen = false" @mousedown.stop class="ml-2 text-zinc-400 hover:text-white transition-colors flex items-center">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </button>
            <div id="user-dropdown" x-show="userOpen" @mousedown.away="userOpen = false" x-transition.scale.origin.top.right class="zypo-dropdown w-80 bg-[#18181b] border border-zinc-800 rounded-3xl shadow-2xl p-5 overflow-hidden" x-cloak>
              <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
              <h3 class="text-white font-bold mb-4 flex items-center gap-2" x-text="t('browser.user_profile')"></h3>
              <div class="space-y-4">
                <div class="bg-gradient-to-br from-zinc-800 to-zinc-900 rounded-2xl p-4 border border-zinc-700 shadow-lg relative overflow-hidden">
                  <div class="flex justify-between items-start mb-1">
                    <div class="text-[10px] text-zinc-500 uppercase font-black" x-text="t('browser.current_balance')"></div>
                    <template x-if="isCached"><span class="text-[8px] bg-zinc-700 text-zinc-400 px-1.5 py-0.5 rounded uppercase font-bold" x-text="t('browser.cached')"></span></template>
                  </div>
                  <div class="flex items-baseline gap-2">
                    <span class="text-3xl font-bold text-white" x-text="balance"></span><span class="text-sm font-bold text-blue-400">ZPCN</span>
                  </div>
                  <div class="mt-2 flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full" :class="{'bg-green-500 animate-pulse': economyStatus === 'synced','bg-yellow-500 animate-bounce': economyStatus === 'syncing','bg-red-500': economyStatus === 'offline','bg-purple-500': economyStatus === 'unregistered'}"></div>
                    <span class="text-[9px] uppercase font-black text-zinc-500" x-text="t('browser.status_' + economyStatus)"></span>
                  </div>
                </div>
                <div class="bg-black/40 rounded-2xl p-3 border border-zinc-800/50">
                  <div class="text-[10px] text-zinc-600 uppercase font-black mb-1" x-text="t('browser.your_peer_id')"></div>
                  <div class="text-[10px] text-zinc-400 font-mono break-all" x-text="peerId"></div>
                </div>
                <div class="pt-2 border-t border-zinc-800/50">
                  <input type="text" x-model="transferTo" :placeholder="t('browser.recipient_id')" class="w-full bg-black border border-zinc-800 rounded-xl px-3 py-2 text-xs text-white mb-2 outline-none focus:border-blue-500 transition-all">
                  <input type="number" x-model="transferAmount" :placeholder="t('browser.amount')" class="w-full bg-black border border-zinc-800 rounded-xl px-3 py-2 text-xs text-white mb-2 outline-none focus:border-blue-500 transition-all">
                  <button @click="performTransfer()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2.5 rounded-xl transition-all" x-text="t('browser.transfer_button')"></button>
                </div>
              </div>
            </div>
          </div>

          <!-- Network Button & Dropdown -->
          <div class="relative">
            <button id="btn-network" @click.stop="networkOpen = !networkOpen; userOpen = false; menuOpen = false" @mousedown.stop class="ml-2 transition-colors flex items-center" :class="status === 'connected' ? 'text-green-500' : (status === 'connecting' ? 'text-yellow-500' : 'text-red-500')">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"></path></svg>
            </button>
            <div id="network-dropdown" x-show="networkOpen" @mousedown.away="networkOpen = false" x-transition.scale.origin.top.right class="zypo-dropdown w-72 bg-[#18181b] border border-zinc-800 rounded-3xl shadow-2xl p-5 overflow-hidden" x-cloak>
              <div class="absolute top-0 right-0 w-32 h-32 bg-green-500/10 rounded-full blur-3xl pointer-events-none"></div>
              <h3 class="text-white font-bold mb-4 flex items-center gap-2" x-text="t('browser.network_status')"></h3>
              <div class="space-y-4">
                 <div class="flex justify-between text-xs">
                    <span class="text-zinc-500" x-text="t('browser.local_status')"></span>
                    <span class="font-bold" :class="status === 'connected' ? 'text-emerald-400' : (status === 'connecting' ? 'text-amber-400' : 'text-rose-400')" x-text="t('browser.status_' + status).toUpperCase()"></span>
                 </div>
                 <div class="flex justify-between text-xs"><span class="text-zinc-500" x-text="t('browser.mesh_peers')"></span><span class="text-white font-mono" x-text="peers"></span></div>
                 <div class="pt-2 border-t border-zinc-800/50">
                    <button @click="reconnectNetwork()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white text-[10px] font-bold py-2 rounded-xl transition-all uppercase mb-2" x-text="t('browser.reconnect_network')"></button>
                    <button @click="createTab('network'); networkOpen = false" class="w-full bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 text-[10px] font-bold py-2 rounded-xl transition-all uppercase" x-text="t('browser.network_details')"></button>
                 </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div id="autocomplete-dropdown" class="hidden absolute top-full left-4 right-4 mt-2 bg-[#18181b] border border-zinc-800 rounded-3xl shadow-2xl overflow-hidden z-[150] opacity-0 transition-opacity duration-200">
        <ul id="autocomplete-list" class="text-sm"></ul>
      </div>
    </div>

    <!-- Menu Button -->
    <div class="relative ml-2">
      <button id="btn-menu" @click.stop="menuOpen = !menuOpen; networkOpen = false; userOpen = false" @mousedown.stop class="p-2 text-zinc-400 hover:bg-zinc-800 rounded-full transition-colors">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
      </button>
      <div id="menu-dropdown" x-show="menuOpen" @mousedown.away="menuOpen = false" x-transition.scale.origin.top.right class="zypo-dropdown w-56 bg-[#18181b] border border-zinc-800 rounded-3xl shadow-2xl py-2 text-sm overflow-hidden" x-cloak>
        <div class="px-4 py-2 hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3 text-zinc-300 hover:text-white" id="menu-wallet">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
          <span x-text="t('browser.menu_wallet')"></span>
        </div>
        <div class="px-4 py-2 hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3 text-zinc-300 hover:text-white" id="menu-network">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
          <span x-text="t('browser.menu_network')"></span>
        </div>
        <div class="px-4 py-2 hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3 text-zinc-300 hover:text-white" id="menu-bookmarks">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
          <span x-text="t('browser.menu_bookmarks')"></span>
        </div>
        <div class="px-4 py-2 hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3 text-zinc-300 hover:text-white" id="menu-history">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <span x-text="t('browser.menu_history')"></span>
        </div>
        <div class="px-4 py-2 hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3 text-zinc-300 hover:text-white" id="menu-downloads">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span x-text="t('downloads.title')"></span>
        </div>
        <div class="px-4 py-2 hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3 text-zinc-300 hover:text-white" id="menu-settings">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span x-text="t('settings.title')"></span>
        </div>
        <div class="border-t border-zinc-800 my-1"></div>
        <div class="px-4 py-2 hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3 text-zinc-500 hover:text-white" id="menu-about">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <span x-text="t('browser.menu_about')"></span>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Tabs Bar -->
  <div id="tabs-container" class="flex px-3 py-0 items-center space-x-1 no-drag overflow-x-auto bg-black">
    <button id="btn-new-tab" class="p-1 ml-1 text-zinc-400 hover:bg-zinc-800 hover:text-white rounded-full transition-colors">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
    </button>
  </div>
  
  <!-- Viewport Area -->
  <div id="views-container" class="flex-1 relative bg-[#18181b] rounded-t-xl border-t border-zinc-600/30 overflow-hidden shadow-2xl">
    <div x-show="userOpen || networkOpen || menuOpen" @mousedown="userOpen = false; networkOpen = false; menuOpen = false" class="dropdown-backdrop"></div>
  </div>

  <script>
    function browserApp() {
      return {
        userOpen: false, networkOpen: false, menuOpen: false,
        status: 'offline', peers: 0, balance: 0, peerId: '...',
        economyStatus: 'offline', isCached: false, transferTo: '', transferAmount: '',
        translations: {},
        modal: { open: false, title: '', message: '', type: 'info', amount: 0, to: '', comment: '' },

        async init() {
          const { ipcRenderer } = window.electron;
          const settings = await ipcRenderer.invoke('get-settings');
          this.translations = await ipcRenderer.invoke('get-translations', settings.language || 'en');
          this.updateStats();
          setInterval(() => this.updateStats(), 3000);
          window.addEventListener('zypo-sdk-ready', () => this.updateStats());
          ipcRenderer.on('settings-updated', async () => {
             this.translations = await ipcRenderer.invoke('get-translations', (await ipcRenderer.invoke('get-settings')).language || 'en');
          });
          ipcRenderer.on('show-modal', (opts) => {
             this.modal.title = opts.title || '';
             this.modal.message = opts.message || '';
             this.modal.type = opts.type || 'info';
             this.modal.amount = opts.amount || 0;
             this.modal.to = opts.to || '';
             this.modal.comment = opts.comment || '';
             this.modal.open = true;
          });
        },
        async updateStats() {
          const { ipcRenderer } = window.electron;
          const port = await ipcRenderer.invoke('get-rpc-port');
          const token = await ipcRenderer.invoke('get-rpc-token');
          if (!port) return;
          try {
            const resp = await fetch(`http://127.0.0.1:${port}/rpc/status`, { headers: { 'Authorization': token } });
            const data = await resp.json();
            this.status = data.peers > 0 ? 'connected' : 'connecting';
            this.peers = data.peers; this.balance = data.balance;
            this.peerId = data.peer_id || 'unknown';
            this.economyStatus = data.economy_status || 'offline';
          } catch(e) {}
        },
        async reconnectNetwork() {
          const { ipcRenderer } = window.electron;
          const port = await ipcRenderer.invoke('get-rpc-port');
          const token = await ipcRenderer.invoke('get-rpc-token');
          try {
            await fetch(`http://127.0.0.1:${port}/rpc/network/reconnect`, { headers: { 'Authorization': token } });
            this.alert(this.t('browser.network_status'), this.t('browser.reconnecting_msg'), 'info');
            this.networkOpen = false;
          } catch(e) {}
        },
        t(key) {
          if (!key) return '';
          const parts = key.split('.');
          let res = this.translations;
          if (!res || Object.keys(res).length === 0) return key;

          for (const p of parts) {
            if (res && typeof res === 'object' && p in res) {
              res = res[p];
            } else {
              return key;
            }
          }
          return typeof res === 'string' ? res : key;
        },
        openVPN() { if (window.createTab) window.createTab('vpn'); },
        async performTransfer() {
           const { ipcRenderer } = window.electron;
           const port = await ipcRenderer.invoke('get-rpc-port');
           const token = await ipcRenderer.invoke('get-rpc-token');
           try {
              const res = await fetch(`http://127.0.0.1:${port}/rpc/account/transfer`, {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json', 'Authorization': token },
                 body: JSON.stringify({ to: this.transferTo.trim(), amount: parseInt(this.transferAmount), from: this.peerId })
              });
              if (!res.ok) {
                 const errText = await res.text();
                 throw new Error(errText || res.statusText);
              }
              const data = await res.json();
              if (data.success) { this.alert(this.t('browser.success'), this.t('browser.transfer_success'), 'success'); this.transferTo = ''; this.transferAmount = ''; this.userOpen = false; this.updateStats(); }
              else { this.alert(this.t('browser.error'), data.error || this.t('browser.transfer_error'), 'error'); }
           } catch(e) { this.alert('Error', e.message, 'error'); }
        },
        alert(title, message, type = 'info') {
          this.modal.title = title; this.modal.message = message; this.modal.type = type; this.modal.open = true;
        },
        respondModal(responseValue) {
          this.modal.open = false;
          window.electron.ipcRenderer.send(`modal-response-${this.modal.type}`, responseValue);
        }
      }
    }
  </script>

  <!-- Global Modal UI -->
  <div x-show="modal.open" x-cloak class="fixed inset-0 z-[10000] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm" 
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @keydown.window.escape="if(modal.open) { if(modal.type==='payment'||modal.type==='confirm') respondModal(0); else modal.open=false; }">
    <div @click.away="modal.type !== 'payment' && modal.type !== 'confirm' ? modal.open = false : null" 
         class="w-full max-w-md bg-[#18181b] border border-zinc-800 rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden" 
         x-show="modal.open"
         x-transition:enter="transition cubic-bezier(0.34, 1.56, 0.64, 1) duration-500"
         x-transition:enter-start="opacity-0 scale-75 translate-y-8 rotate-3"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0 rotate-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4">
      <div class="absolute top-0 right-0 w-32 h-32 opacity-20 rounded-full blur-3xl pointer-events-none" :class="{'bg-blue-500': modal.type === 'info','bg-green-500': modal.type === 'success','bg-red-500': modal.type === 'error','bg-purple-500': modal.type === 'payment', 'bg-amber-500': modal.type === 'confirm'}"></div>
      
      <div class="flex items-center justify-center w-16 h-16 rounded-full mb-6 mx-auto" :class="{'bg-blue-500/10 text-blue-400': modal.type === 'info','bg-green-500/10 text-green-400': modal.type === 'success','bg-red-500/10 text-red-400': modal.type === 'error','bg-purple-500/10 text-purple-400': modal.type === 'payment','bg-amber-500/10 text-amber-400': modal.type === 'confirm'}">
        <template x-if="modal.type === 'success'"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></template>
        <template x-if="modal.type === 'error'"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></template>
        <template x-if="modal.type === 'info'"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></template>
        <template x-if="modal.type === 'payment'"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></template>
        <template x-if="modal.type === 'confirm'"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></template>
      </div>

      <h3 class="text-2xl font-black mb-2 text-white text-center" x-text="modal.type === 'payment' ? (t('browser.modal_payment_title') || 'Zypo Payment Request') : modal.title"></h3>
      <p class="text-zinc-400 text-sm mb-6 leading-relaxed text-center" x-text="modal.type === 'payment' ? (t('browser.modal_payment_message') || 'A website is requesting a payment of {amount} ZPCN.').replace('{amount}', modal.amount) : modal.message"></p>

      <!-- Extra Details for Payment Mode -->
      <template x-if="modal.type === 'payment'">
        <div class="mb-8 space-y-3">
          <div class="bg-black/40 border border-zinc-800/50 rounded-2xl p-4 flex flex-col items-center justify-center">
             <div class="text-[10px] text-zinc-500 uppercase font-black mb-1" x-text="t('browser.modal_amount') || 'Amount'"></div>
             <div class="text-3xl font-bold text-white"><span x-text="modal.amount"></span> <span class="text-sm text-blue-400">ZPCN</span></div>
          </div>
          <div class="bg-black/40 border border-zinc-800/50 rounded-2xl p-3">
             <div class="text-[10px] text-zinc-500 uppercase font-black mb-1" x-text="t('browser.modal_recipient') || 'Recipient'"></div>
             <div class="text-xs text-zinc-300 font-mono break-all" x-text="modal.to"></div>
          </div>
          <div class="bg-black/40 border border-zinc-800/50 rounded-2xl p-3" x-show="modal.comment">
             <div class="text-[10px] text-zinc-500 uppercase font-black mb-1" x-text="t('browser.modal_comment') || 'Comment'"></div>
             <div class="text-xs text-zinc-300" x-text="modal.comment"></div>
          </div>
        </div>
      </template>

      <!-- Buttons -->
      <div class="flex flex-col gap-3">
        <!-- Confirm/Payment Buttons -->
        <template x-if="modal.type === 'payment' || modal.type === 'confirm'">
          <div class="flex gap-3">
            <button @click="respondModal(0)" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl font-black transition-all duration-300 active:scale-95" x-text="t('browser.modal_cancel') || 'Cancel'"></button>
            <button @click="respondModal(1)" class="flex-1 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black transition-all duration-300 shadow-lg active:scale-95" x-text="modal.type === 'payment' ? (t('browser.modal_pay') || 'Pay Now') : (t('browser.modal_confirm') || 'Confirm')"></button>
          </div>
        </template>
        
        <!-- Standard Dismiss Button -->
        <template x-if="modal.type !== 'payment' && modal.type !== 'confirm'">
          <button @click="modal.open = false" class="w-full py-4 bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl font-black transition-all duration-300 active:scale-95" x-text="t('browser.modal_dismiss') || 'Close'"></button>
        </template>
      </div>
    </div>
  </div>

  <script src="js/globals.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/webview.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
