<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zypo Network</title>
    <link rel="stylesheet" href="zb://dist/tailwind.css">
    <script defer src="zb://dist/alpine.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
        }
        [x-cloak] { display: none !important; }
        
        /* Smooth Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pulse-dot {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="selection:bg-blue-500/30">
    <div x-data="networkApp()" x-init="init()" class="h-screen flex flex-col relative overflow-y-auto custom-scroll bg-[#050505] text-white" x-cloak>
        
        <!-- Background Glow -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-blue-500/10 blur-[120px] rounded-full pointer-events-none z-0"></div>

        <!-- Top Bar -->
        <header class="flex justify-between items-center p-6 shrink-0 z-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl glass flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                </div>
                <h1 class="text-xl font-semibold tracking-wide" x-text="t('browser.network_title') || 'Zypo Network'"></h1>
            </div>
            <div class="glass px-4 py-2 rounded-full flex items-center gap-2 max-w-xs">
                <span class="text-xs text-zinc-500 font-medium" x-text="t('browser.network_node_label') + ': '"></span>
                <span class="text-sm font-mono truncate" x-text="stats.peer_id || '...'"></span>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="flex-1 pb-28 px-6 z-10 flex flex-col h-full max-w-4xl mx-auto w-full pt-8">
            
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Connection Status -->
                <div class="glass rounded-[2.5rem] p-8 relative overflow-hidden group hover:bg-white/[0.02] transition-colors duration-300">
                    <div class="absolute -right-12 -top-12 w-48 h-48 bg-blue-500/5 blur-3xl rounded-full group-hover:bg-blue-500/10 transition-all duration-500 pointer-events-none"></div>
                    <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-400 mb-6 border border-blue-500/20 shadow-inner">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </div>
                    <h2 class="text-zinc-500 text-xs font-semibold uppercase tracking-widest mb-2" x-text="t('browser.network_connected_peers')"></h2>
                    <div class="flex items-baseline gap-2 mb-2">
                        <span class="text-5xl font-light tracking-tight" x-text="stats.peers !== undefined ? stats.peers : '--'"></span>
                        <span class="text-zinc-400 font-medium text-sm" x-text="t('browser.network_nodes_count')"></span>
                    </div>
                    <div class="flex gap-2 text-[10px] uppercase font-bold tracking-widest text-zinc-500 mt-4" x-show="stats.transport_stats">
                        <div class="flex flex-col"><span class="text-white text-sm" x-text="stats.transport_stats?.quic || 0"></span> QUIC</div>
                        <div class="flex flex-col"><span class="text-white text-sm" x-text="stats.transport_stats?.ws || 0"></span> WS</div>
                        <div class="flex flex-col"><span class="text-white text-sm" x-text="stats.transport_stats?.tcp || 0"></span> TCP</div>
                        <div class="flex flex-col"><span class="text-white text-sm" x-text="stats.transport_stats?.relay || 0"></span> RELAY</div>
                    </div>
                </div>
                
                <!-- Economy Status -->
                <div class="glass rounded-[2.5rem] p-8 relative overflow-hidden group hover:bg-white/[0.02] transition-colors duration-300">
                    <div class="absolute -right-12 -top-12 w-48 h-48 bg-emerald-500/5 blur-3xl rounded-full group-hover:bg-emerald-500/10 transition-all duration-500 pointer-events-none"></div>
                    <div class="w-12 h-12 rounded-2xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 mb-6 border border-emerald-500/20 shadow-inner">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    </div>
                    <h2 class="text-zinc-500 text-xs font-semibold uppercase tracking-widest mb-2" x-text="t('browser.network_oracle_sync')"></h2>
                    <div class="flex items-center gap-3 mt-4">
                        <div class="w-3 h-3 rounded-full shrink-0" :class="stats.economy_status === 'synced' ? 'bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]' : (stats.economy_status === 'syncing' ? 'bg-amber-500 animate-pulse shadow-[0_0_15px_rgba(245,158,11,0.5)]' : (stats.economy_status === 'mesh_only' ? 'bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]' : 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]'))"></div>
                        <span class="text-xl font-medium tracking-wide capitalize truncate" x-text="t('browser.status_' + (stats.economy_status || 'offline'))"></span>
                    </div>
                </div>

                <!-- Local RPC Port -->
                <div class="glass rounded-[2.5rem] p-8 relative overflow-hidden group hover:bg-white/[0.02] transition-colors duration-300">
                    <div class="absolute -right-12 -top-12 w-48 h-48 bg-purple-500/5 blur-3xl rounded-full group-hover:bg-purple-500/10 transition-all duration-500 pointer-events-none"></div>
                    <div class="w-12 h-12 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400 mb-6 border border-purple-500/20 shadow-inner">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
                    </div>
                    <h2 class="text-zinc-500 text-xs font-semibold uppercase tracking-widest mb-2" x-text="t('browser.network_local_rpc')"></h2>
                    <div class="flex items-baseline gap-3">
                        <span class="text-4xl font-light font-mono" x-text="rpcPort || '--'"></span>
                    </div>
                </div>
            </div>

            <!-- Diagnostics Panel -->
            <div class="mt-8 p-6 glass rounded-3xl" x-show="stats.diagnostics">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        <span x-text="t('browser.diagnostics_title') || 'Diagnostics'"></span>
                    </h2>
                    <button @click="reconnect()" :disabled="loading" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors disabled:opacity-50 flex items-center gap-2">
                        <svg x-show="loading" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span x-text="t('browser.diagnostics_autofix') || 'Auto-Fix'"></span>
                    </button>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800/50 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" :class="stats.diagnostics.dht_healthy ? 'bg-emerald-500/20 text-emerald-500' : 'bg-red-500/20 text-red-500'">
                            <svg x-show="stats.diagnostics.dht_healthy" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            <svg x-show="!stats.diagnostics.dht_healthy" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </div>
                        <div>
                            <div class="font-medium" x-text="t('browser.diag_dht_title') || 'DHT Network'"></div>
                            <div class="text-xs text-zinc-500" x-text="stats.diagnostics.dht_healthy ? (t('browser.diag_dht_ok') || 'Connected to swarm') : (t('browser.diag_dht_err') || 'No peers found. Check internet.')"></div>
                        </div>
                    </div>

                    <div class="p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800/50 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" :class="stats.diagnostics.cc_alive ? 'bg-emerald-500/20 text-emerald-500' : 'bg-amber-500/20 text-amber-500'">
                            <svg x-show="stats.diagnostics.cc_alive" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            <svg x-show="!stats.diagnostics.cc_alive" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        </div>
                        <div>
                            <div class="font-medium" x-text="t('browser.diag_cc_title') || 'Command Center'"></div>
                            <div class="text-xs text-zinc-500" x-text="stats.diagnostics.cc_alive ? (t('browser.diag_cc_ok') || 'Synced & Verified') : (t('browser.diag_cc_err') || 'Syncing or offline. Reconnect.')"></div>
                        </div>
                    </div>

                    <div class="p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800/50 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" :class="stats.diagnostics.bridge_active ? 'bg-blue-500/20 text-blue-500' : 'bg-zinc-800 text-zinc-600'">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
                        </div>
                        <div>
                            <div class="font-medium" x-text="t('browser.diag_bridge_title') || 'Bridge Protocol'"></div>
                            <div class="text-xs text-zinc-500" x-text="stats.diagnostics.bridge_active ? (t('browser.diag_bridge_ok') || 'Relaying traffic for NAT peers') : (t('browser.diag_bridge_inactive') || 'Inactive (using direct mesh)')"></div>
                        </div>
                    </div>

                    <div class="p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800/50 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" :class="stats.diagnostics.vpn_active ? 'bg-purple-500/20 text-purple-500' : 'bg-zinc-800 text-zinc-600'">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <div>
                            <div class="font-medium flex items-center gap-2">
                                <span x-text="t('browser.diag_vpn_title') || 'VPN & DNS'"></span>
                                <span x-show="stats.diagnostics.vpn_active && !stats.diagnostics.tun_available" class="text-[9px] uppercase font-bold bg-amber-500/20 text-amber-500 px-1.5 py-0.5 rounded cursor-help" title="Requires root for full system routing. Currently ONLY Zypo Browser traffic is using VPN.">BROWSER PROXY</span>
                                <span x-show="stats.diagnostics.vpn_active && stats.diagnostics.tun_available" class="text-[9px] uppercase font-bold bg-emerald-500/20 text-emerald-500 px-1.5 py-0.5 rounded cursor-help" title="Full system network is being routed through VPN.">TUN SYSTEM VPN</span>
                            </div>
                            <div class="text-xs text-zinc-500" x-text="stats.diagnostics.vpn_active ? (stats.diagnostics.tun_available ? (t('browser.diag_vpn_ok') || 'Full System Routing (TUN Active)') : 'Only browser traffic is proxied. Need Admin/Root for full system VPN.') : (t('browser.diag_vpn_inactive') || 'Not connected')"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Topology Section -->
            <div class="mt-12 mb-8">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2" x-text="t('browser.network_topology')"></h2>
                <div class="grid grid-cols-1 gap-3">
                    <template x-for="peer in stats.topology" :key="peer.id">
                        <div class="glass rounded-2xl p-4 flex items-center justify-between group hover:bg-white/[0.03] transition-colors border-l-4" :class="peer.is_bootstrap ? 'border-l-emerald-500' : 'border-l-zinc-800'">
                            <div class="flex items-center gap-4 min-w-0">
                                <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" :class="peer.is_bootstrap ? 'bg-emerald-500/10 text-emerald-500' : 'bg-zinc-800 text-zinc-500'">
                                    <svg x-show="peer.is_bootstrap" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                    <svg x-show="!peer.is_bootstrap" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                </div>
                                <div class="min-w-0">
                                    <div class="text-sm font-mono truncate" x-text="peer.id"></div>
                                    <div class="flex gap-2 mt-2 flex-wrap">
                                        <span x-show="peer.is_bootstrap" class="text-[9px] font-bold uppercase bg-emerald-500/20 text-emerald-500 px-1.5 py-0.5 rounded" x-text="t('browser.network_bootstrap_node')"></span>
                                        <span x-show="peer.is_relayed" class="text-[9px] font-bold uppercase bg-amber-500/20 text-amber-500 px-1.5 py-0.5 rounded" x-text="t('browser.network_relayed_node')"></span>
                                        <template x-for="tr in peer.transports">
                                            <span class="text-[9px] font-bold uppercase bg-blue-500/20 text-blue-500 px-1.5 py-0.5 rounded" x-text="tr"></span>
                                        </template>
                                        <template x-for="addr in peer.addrs">
                                            <span class="text-[9px] font-mono text-zinc-600 truncate max-w-[200px]" x-text="addr"></span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                    <div x-show="!stats.topology || stats.topology.length === 0" class="text-center py-8 glass rounded-2xl border-dashed border-zinc-800">
                        <p class="text-zinc-500 text-sm" x-text="t('browser.network_no_peers')"></p>
                    </div>
                </div>
            </div>

            <!-- Reconnect Card -->
            <div class="glass rounded-[2.5rem] p-6 md:p-8 mt-8 flex flex-col md:flex-row items-center justify-between gap-6 overflow-hidden relative shrink-0">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-500/5 to-transparent pointer-events-none"></div>
                <div class="relative z-10 flex flex-col items-center md:items-start text-center md:text-left">
                    <h2 class="text-xl font-medium mb-2 tracking-wide" x-text="t('browser.dht_connectivity')"></h2>
                    <p class="text-zinc-400 text-sm max-w-lg" x-text="t('browser.dht_desc')"></p>
                </div>
                <button @click="reconnect()" :disabled="loading" class="relative z-10 w-full md:w-auto shrink-0 bg-white text-black font-semibold px-8 py-4 rounded-full hover:bg-zinc-200 active:scale-95 transition-all duration-300 disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    <svg x-show="loading" class="animate-spin h-5 w-5 text-black" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <svg x-show="!loading" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.44l5.08 5.08"/></svg>
                    <span x-text="t('browser.reconnect_button')"></span>
                </button>
            </div>
            
        </div>
    </div>

    <script src="zb://js/sdk.js"></script>
    <script>
        function networkApp() {
            return {
                stats: {},
                loading: false,
                rpcPort: 0,
                initialized: false,
                i18n: {},

                async init() {
                    try {
                        if (Zypo._initialized) {
                            await this.onSdkReady();
                        } else {
                            window.addEventListener('zypo-sdk-ready', () => this.onSdkReady());
                            await Zypo.init();
                        }
                        setInterval(() => this.fetchStats(), 2000);
                        this.initialized = true;
                    } catch (e) {
                        console.error('Failed to initialize network page:', e);
                    }
                },

                async onSdkReady() {
                    await Zypo.init();
                    this.i18n = Zypo.getTranslations();
                    this.rpcPort = await Zypo.getRpcPort();
                    await this.fetchStats();
                },

                t(key) {
                    return Zypo.t(key, this.i18n);
                },

                async fetchStats() {
                    const data = await Zypo.getStatus();
                    if (data) {
                        const prevStatus = this.stats.economy_status;
                        this.stats = data;
                        if (data.economy_status === 'offline' && prevStatus === 'synced') {
                            window.Zypo.daemonFetch('/rpc/network/reconnect', { method: 'POST' });
                            this.stats.economy_status = 'syncing';
                        }
                        this.rpcPort = await Zypo.getRpcPort(); 
                    }
                },

                async reconnect() {
                    this.loading = true;
                    try {
                        await Zypo.daemonFetch('/rpc/network/reconnect', { method: 'POST' });
                        setTimeout(() => this.fetchStats(), 1000);
                    } catch(e) {}
                    setTimeout(() => { this.loading = false }, 1000);
                }
            }
        }
    </script>
</body>
</html>
