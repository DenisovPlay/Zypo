<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Downloads</title>
    <link rel="stylesheet" href="zb://dist/tailwind.css">
    <script defer src="zb://dist/alpine.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        [x-cloak] { display: none !important; }
        .glow-card {
            background: linear-gradient(145deg, rgba(39,39,42,0.8), rgba(24,24,27,0.8));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 10px 40px -10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body 
    x-data="downloadsApp()"
    class="min-h-screen flex flex-col p-8 bg-[#09090b] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900/20 via-black to-black"
>
    <div class="max-w-4xl mx-auto w-full space-y-8">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-black tracking-tight mb-2">Downloads</h1>
                <p class="text-zinc-500 text-sm" x-text="downloads.length + ' files'"></p>
            </div>
            <div class="w-16 h-16 rounded-full bg-zinc-800 flex items-center justify-center">
                <svg class="w-8 h-8 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </div>
        </header>

        <!-- Downloads List -->
        <div class="space-y-4">
            <template x-for="dl in downloads" :key="dl.id">
                <div class="glow-card border border-zinc-800/50 rounded-2xl p-6 relative overflow-hidden flex items-center justify-between group">
                    <div class="flex items-center gap-6 z-10 w-full">
                        <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0"
                            :class="dl.state === 'completed' ? 'bg-emerald-500/20 text-emerald-500' : (dl.state === 'progressing' ? 'bg-blue-500/20 text-blue-500' : 'bg-red-500/20 text-red-500')">
                            <svg x-show="dl.state === 'completed'" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            <svg x-show="dl.state === 'progressing'" class="w-6 h-6 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            <svg x-show="dl.state === 'cancelled' || dl.state === 'interrupted'" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </div>
                        <div class="flex-grow overflow-hidden">
                            <div class="font-bold text-lg truncate pr-4" x-text="dl.filename" :title="dl.filename"></div>
                            <div class="flex items-center gap-3 text-sm mt-1">
                                <span class="text-zinc-400" x-text="formatBytes(dl.receivedBytes) + ' / ' + formatBytes(dl.totalBytes)"></span>
                                <span class="text-zinc-600">&bull;</span>
                                <span class="text-zinc-500 font-mono text-xs" x-text="dl.url" :title="dl.url"></span>
                            </div>
                            
                            <!-- Progress Bar -->
                            <div x-show="dl.state === 'progressing'" class="h-1.5 w-full bg-zinc-800 rounded-full mt-3 overflow-hidden">
                                <div class="h-full bg-blue-500 transition-all duration-300" :style="`width: ${(dl.receivedBytes / dl.totalBytes) * 100}%`"></div>
                            </div>
                        </div>
                        <div class="flex flex-col items-end shrink-0 gap-2 z-10">
                            <span class="text-xs font-bold px-2 py-1 rounded capitalize"
                                :class="dl.state === 'completed' ? 'bg-emerald-500/10 text-emerald-400' : (dl.state === 'progressing' ? 'bg-blue-500/10 text-blue-400' : 'bg-red-500/10 text-red-400')"
                                x-text="dl.state"></span>
                            
                            <template x-if="dl.state === 'completed' && dl.path">
                                <button @click="openFile(dl.path)" class="text-xs text-zinc-400 hover:text-white transition-colors underline">Reveal in Finder</button>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="downloads.length === 0" class="text-center py-20 text-zinc-500">
                <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                <p>No downloads yet.</p>
            </div>
        </div>
    </div>

    <script>
        function downloadsApp() {
            return {
                downloads: [],
                
                async init() {
                    const { ipcRenderer } = require('electron');
                    const fs = require('fs');
                    const path = require('path');
                    
                    // Load initial history
                    try {
                        const dlPath = await ipcRenderer.invoke('get-downloads-path');
                        if (fs.existsSync(dlPath)) {
                            this.downloads = JSON.parse(fs.readFileSync(dlPath, 'utf8'));
                        }
                    } catch(e) {}

                    // Listen for updates
                    ipcRenderer.on('download-updated', (e, info) => {
                        const existingIdx = this.downloads.findIndex(d => d.id === info.id);
                        if (existingIdx >= 0) {
                            this.downloads[existingIdx] = info;
                        } else {
                            this.downloads.unshift(info);
                        }
                    });
                },

                formatBytes(bytes, decimals = 2) {
                    if (!+bytes) return '0 Bytes';
                    const k = 1024;
                    const dm = decimals < 0 ? 0 : decimals;
                    const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
                },

                openFile(filePath) {
                    const { shell } = require('electron');
                    shell.showItemInFolder(filePath);
                }
            }
        }
    </script>
</body>
</html>
