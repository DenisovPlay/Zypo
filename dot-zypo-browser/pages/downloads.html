<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Downloads</title>
    <link rel="stylesheet" href="zb://dist/tailwind.css">
    <script defer src="zb://dist/alpine.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
        }
        [x-cloak] { display: none !important; }
        
        /* Smooth Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, rgba(59, 130, 246, 0) 70%);
            filter: blur(120px);
            z-index: -1;
            pointer-events: none;
        }

        .download-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .download-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body 
    x-data="downloadsApp()"
    x-init="init()"
    x-effect="document.title = t('downloads.title')"
    class="min-h-screen flex flex-col items-center pt-16 px-8 selection:bg-blue-500/30"
>
    <div class="bg-glow"></div>

    <div class="w-full max-w-4xl z-10">
        <!-- Header -->
        <header class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 rounded-3xl glass flex items-center justify-center text-blue-400 shadow-inner">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </div>
                <div>
                    <h1 class="text-4xl font-black tracking-tight" x-text="t('downloads.title')"></h1>
                    <p class="text-zinc-500 text-sm font-medium mt-1" x-text="downloads.length + ' ' + t('downloads.files')"></p>
                </div>
            </div>
        </header>

        <!-- Downloads List -->
        <div class="glass rounded-[3rem] overflow-hidden mb-20 shadow-2xl divide-y divide-white/5">
            <template x-for="dl in downloads" :key="dl.id">
                <div class="download-item p-8 flex flex-col gap-6 group">
                    <div class="flex items-center justify-between gap-6">
                        <div class="flex items-center gap-6 min-w-0 flex-1">
                            <div class="w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 shadow-lg"
                                :class="dl.state === 'completed' ? 'bg-emerald-500/10 text-emerald-500' : (dl.state === 'progressing' ? 'bg-blue-500/10 text-blue-400' : 'bg-rose-500/10 text-rose-500')">
                                <svg x-show="dl.state === 'completed'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                                <svg x-show="dl.state === 'progressing'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-bounce"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
                                <svg x-show="dl.state !== 'completed' && dl.state !== 'progressing'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                            </div>
                            <div class="min-w-0 flex-1">
                                <div class="font-bold text-xl text-zinc-100 truncate group-hover:text-white transition-colors" x-text="dl.filename"></div>
                                <div class="flex items-center gap-3 text-sm mt-1.5 font-medium">
                                    <span class="text-zinc-500" x-text="formatBytes(dl.receivedBytes) + ' / ' + formatBytes(dl.totalBytes)"></span>
                                    <span class="text-zinc-800">•</span>
                                    <span class="text-zinc-600 font-mono text-[10px] truncate max-w-sm group-hover:text-zinc-400 transition-colors" x-text="dl.url"></span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex flex-col items-end gap-3 shrink-0">
                            <span class="text-[10px] font-black tracking-widest uppercase px-3 py-1.5 rounded-full"
                                :class="dl.state === 'completed' ? 'bg-emerald-500/10 text-emerald-500' : (dl.state === 'progressing' ? 'bg-blue-500/10 text-blue-400' : 'bg-rose-500/10 text-rose-500')"
                                x-text="t('downloads.state_' + dl.state)"></span>
                            
                            <button x-show="dl.state === 'completed' && dl.path" @click="openFile(dl.path)" class="text-xs font-bold text-blue-400 hover:text-blue-300 transition-colors underline underline-offset-4" x-text="t('downloads.reveal')"></button>
                        </div>
                    </div>

                    <!-- Progress Bar (Only for progressing) -->
                    <div x-show="dl.state === 'progressing'" class="w-full h-2 bg-white/5 rounded-full overflow-hidden shadow-inner">
                        <div class="h-full bg-gradient-to-r from-blue-600 to-blue-400 transition-all duration-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]" :style="`width: ${(dl.receivedBytes / (dl.totalBytes || 1)) * 100}%`"></div>
                    </div>
                </div>
            </template>
            
            <!-- Empty State -->
            <div x-show="downloads.length === 0" class="py-40 text-center">
                <div class="w-24 h-24 rounded-full bg-zinc-900 flex items-center justify-center mx-auto mb-8 text-zinc-800 shadow-inner">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </div>
                <p class="text-zinc-600 font-bold uppercase tracking-[0.2em] text-sm" x-text="t('downloads.empty')"></p>
            </div>
        </div>
    </div>

    <script src="zb://js/sdk.js"></script>
    <script>
        function downloadsApp() {
            return {
                downloads: [],
                i18n: {},
                
                async init() {
                    const { ipcRenderer } = window.electron;
                    await Zypo.init();
                    this.i18n = Zypo.getTranslations();
                    
                    try {
                        const dls = await ipcRenderer.invoke('get-downloads');
                        if (dls) this.downloads = dls;
                    } catch(e) {}

                    ipcRenderer.on('download-updated', (e, info) => {
                        const existingIdx = this.downloads.findIndex(d => d.id === info.id);
                        if (existingIdx >= 0) this.downloads[existingIdx] = info;
                        else this.downloads.unshift(info);
                    });

                    ipcRenderer.on('settings-updated', async () => {
                        await Zypo.init();
                        this.i18n = Zypo.getTranslations();
                    });
                },

                t(key) { return Zypo.t(key, this.i18n); },

                formatBytes(bytes, decimals = 2) {
                    if (!+bytes) return '0 Bytes';
                    const k = 1024;
                    const dm = decimals < 0 ? 0 : decimals;
                    const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
                },

                openFile(filePath) {
                    const { shell } = window.electron;
                    shell.showItemInFolder(filePath);
                }
            }
        }
    </script>
</body>
</html>
