<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Zypo</title>
    <link rel="stylesheet" href="zb://dist/tailwind.css">
    <script defer src="zb://dist/alpine.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
        }
        [x-cloak] { display: none !important; }
        
        /* Smooth Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(120px);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body 
    x-data="aboutData()"
    x-init="init()"
    x-effect="document.title = t('about.title')"
    class="min-h-screen flex flex-col items-center pt-24 px-8 selection:bg-white/20"
>
    <div class="bg-glow"></div>

    <div class="w-full max-w-xl text-center z-10">
        <!-- Logo Icon -->
        <div class="w-24 h-24 rounded-[2rem] mx-auto mb-10 shadow-[0_0_50px_rgba(255,255,255,0.15)] animate-in zoom-in duration-700 overflow-hidden">
            <img src="zb://dist/logo.png" class="w-full h-full object-cover" alt="Zypo Logo">
        </div>

        <h1 class="text-6xl font-black mb-2 tracking-tighter text-white" x-text="t('about.title')"></h1>
        <p class="text-zinc-500 font-bold mb-16 uppercase tracking-[0.3em] text-[10px]" x-text="t('about.version')"></p>
        
        <div class="glass rounded-[3rem] overflow-hidden shadow-2xl mb-12 animate-in fade-in slide-in-from-bottom-8 duration-700">
            <div class="divide-y divide-white/5">
                <template x-for="(value, key) in info" :key="key">
                    <div class="flex items-center justify-between p-8 hover:bg-white/[0.02] transition-colors group">
                        <span class="text-xs font-bold text-zinc-500 uppercase tracking-widest group-hover:text-zinc-400 transition-colors" x-text="key"></span>
                        <span class="text-sm font-mono text-zinc-300 group-hover:text-white transition-colors" x-text="value"></span>
                    </div>
                </template>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-12 animate-in fade-in duration-1000 delay-300">
            <button 
                @click="exportKey()" 
                :disabled="loading"
                class="w-full sm:w-auto group relative inline-flex items-center justify-center gap-3 px-10 py-5 bg-zinc-900 border border-white/5 text-white rounded-[1.5rem] font-bold text-sm transition-all hover:bg-zinc-800 hover:scale-105 active:scale-95 disabled:opacity-50"
            >
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                <span x-text="t('about.export_button')"></span>
            </button>

            <button 
                @click="importKey()" 
                :disabled="loading"
                class="w-full sm:w-auto group relative inline-flex items-center justify-center gap-3 px-10 py-5 bg-white text-black rounded-[1.5rem] font-bold text-sm transition-all hover:bg-zinc-200 hover:scale-105 active:scale-95 disabled:opacity-50"
            >
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span x-text="t('about.import_button')"></span>
            </button>
        </div>

        <div 
            x-show="msg" 
            x-cloak
            x-transition 
            class="fixed bottom-12 left-1/2 -translate-x-1/2 px-8 py-4 glass rounded-2xl font-bold text-sm shadow-2xl" 
            :class="error ? 'text-rose-400 border-rose-500/20' : 'text-emerald-400 border-emerald-500/20'" 
            x-text="msg"
        ></div>
    </div>

    <script src="zb://js/sdk.js"></script>
    <script>
        /*INJECT_SYSINFO*/
        window.SYSINFO = window.SYSINFO || { 'Zypo Core': 'v1.1.0-alpha', 'Electron': '...', 'OS Arch': '...', 'Platform': '...' };

        function aboutData() {
            return {
                info: {},
                msg: '',
                error: false,
                loading: false,
                i18n: {},
                async init() {
                    const { ipcRenderer } = window.electron;
                    await Zypo.init();
                    this.i18n = Zypo.getTranslations();
                    
                    const sysinfo = window.SYSINFO || {};
                    this.info = {
                        [this.t('about.sysinfo_core')]: sysinfo['Zypo Core'],
                        [this.t('about.sysinfo_electron')]: sysinfo['Electron'],
                        [this.t('about.sysinfo_arch')]: sysinfo['OS Arch'],
                        [this.t('about.sysinfo_platform')]: sysinfo['Platform']
                    };
                    
                    ipcRenderer.on('settings-updated', async () => {
                        await Zypo.init();
                        this.i18n = Zypo.getTranslations();
                    });
                },
                t(path) {
                    return Zypo.t(path, this.i18n);
                },
                async exportKey() {
                    const { ipcRenderer } = window.electron;
                    this.loading = true;
                    try {
                        const res = await ipcRenderer.invoke('export-key');
                        if (res.success) {
                            this.msg = this.t('about.export_success');
                            this.error = false;
                        } else if (res.error) {
                            this.msg = this.t('about.export_error') + res.error;
                            this.error = true;
                        }
                    } catch(e) {
                        this.msg = this.t('about.export_error') + e.message;
                        this.error = true;
                    }
                    this.loading = false;
                    setTimeout(() => this.msg = '', 4000);
                },
                async importKey() {
                    const { ipcRenderer } = window.electron;
                    this.loading = true;
                    try {
                        const res = await ipcRenderer.invoke('import-key');
                        if (res.success) {
                            this.msg = this.t('about.import_success');
                            this.error = false;
                        } else if (res.error) {
                            this.msg = this.t('about.import_error') + res.error;
                            this.error = true;
                        }
                    } catch(e) {
                        this.msg = this.t('about.import_error') + e.message;
                        this.error = true;
                    }
                    this.loading = false;
                    setTimeout(() => this.msg = '', 4000);
                }
            }
        }
    </script>
</body>
</html>
