<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History</title>
    <link rel="stylesheet" href="zb://dist/tailwind.css">
    <script defer src="zb://dist/alpine.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
        }
        [x-cloak] { display: none !important; }
        
        /* Smooth Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.05) 0%, rgba(168, 85, 247, 0) 70%);
            filter: blur(120px);
            z-index: -1;
            pointer-events: none;
        }

        .history-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(4px);
        }
    </style>
</head>
<body 
    x-data="historyData()"
    x-init="init()"
    x-effect="document.title = t('history.title')"
    class="min-h-screen flex flex-col items-center pt-16 px-8 selection:bg-purple-500/30"
>
    <div class="bg-glow"></div>

    <div class="w-full max-w-4xl z-10">
        <!-- Header -->
        <header class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 rounded-3xl glass flex items-center justify-center text-purple-400 shadow-inner">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                    <h1 class="text-4xl font-black tracking-tight" x-text="t('history.title')"></h1>
                    <p class="text-zinc-500 text-sm font-medium mt-1" x-text="filtered.length + ' ' + t('history.entries')"></p>
                </div>
            </div>
            
            <button 
                @click="clearHistory()"
                class="px-8 py-3 bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white border border-rose-500/20 rounded-2xl font-bold text-sm transition-all active:scale-95 shadow-lg"
                x-text="t('history.clear_button')"
            ></button>
        </header>

        <!-- Search Bar -->
        <div class="relative mb-10">
            <div class="absolute left-6 top-1/2 -translate-y-1/2 text-zinc-500 z-10 pointer-events-none">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
            <input 
                type="text" 
                x-model="query" 
                :placeholder="t('history.search')" 
                class="w-full glass bg-white/5 border-none rounded-[2rem] pl-16 pr-8 py-5 text-lg outline-none focus:ring-2 focus:ring-purple-500/30 transition-all placeholder-zinc-600"
            >
        </div>

        <!-- History List -->
        <div class="glass rounded-[3rem] overflow-hidden mb-20 shadow-2xl divide-y divide-white/5">
            <template x-for="h in filtered" :key="h.time + h.url">
                <div class="history-item p-6 flex items-center justify-between group">
                    <div class="flex items-center gap-5 min-w-0 flex-1">
                        <div class="w-10 h-10 rounded-2xl bg-zinc-900 flex items-center justify-center text-lg shrink-0">
                            <span x-text="h.title ? h.title.charAt(0).toUpperCase() : '🌐'"></span>
                        </div>
                        <div class="min-w-0">
                            <div class="font-bold text-zinc-200 truncate group-hover:text-white transition-colors" x-text="h.title || 'No Title'"></div>
                            <div class="text-xs text-zinc-500 font-mono mt-1 truncate max-w-md group-hover:text-purple-400 transition-colors" x-text="h.url"></div>
                        </div>
                    </div>
                    <div class="flex items-center gap-6 shrink-0">
                        <span class="text-xs font-bold text-zinc-600 uppercase tracking-widest" x-text="formatTime(h.time)"></span>
                        <a :href="h.url" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-zinc-500 hover:bg-white/10 hover:text-white transition-all active:scale-90">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        </a>
                    </div>
                </div>
            </template>
            
            <!-- Empty State -->
            <div x-show="filtered.length === 0" class="py-32 text-center">
                <div class="w-20 h-20 rounded-full bg-zinc-900 flex items-center justify-center mx-auto mb-6 text-zinc-700">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <p class="text-zinc-500 font-bold uppercase tracking-widest text-sm" x-text="t('history.empty')"></p>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div x-show="modal.open" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md animate-in fade-in duration-300">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-10 text-center shadow-2xl border-rose-500/10 animate-in zoom-in-95 duration-500">
            <div class="w-20 h-20 rounded-full bg-rose-500/10 text-rose-500 flex items-center justify-center mx-auto mb-8 shadow-inner">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-3 text-white" x-text="modal.title"></h3>
            <p class="text-zinc-500 text-sm mb-10 font-medium" x-text="modal.desc"></p>
            <div class="flex gap-3">
                <button @click="modal.open = false" class="flex-1 px-8 py-4 glass bg-white/5 hover:bg-white/10 rounded-2xl font-bold text-sm transition-all" x-text="t('newtab.cancel')"></button>
                <button @click="executeClear()" class="flex-1 px-8 py-4 bg-rose-600 text-white rounded-2xl font-bold text-sm shadow-lg shadow-rose-600/20 active:scale-95 transition-all" x-text="t('history.clear_button')"></button>
            </div>
        </div>
    </div>

    <script src="zb://js/sdk.js"></script>
    <script>
        /*INJECT_HISTORY*/
        window.HISTORY = window.HISTORY || [];

        function historyData() {
            return {
                query: '',
                history: window.HISTORY,
                modal: { open: false, title: '', desc: '' },
                i18n: {},
                get filtered() {
                    if (!this.query) return this.history;
                    return this.history.filter(h => 
                        h.title.toLowerCase().includes(this.query.toLowerCase()) || 
                        h.url.toLowerCase().includes(this.query.toLowerCase())
                    );
                },
                async init() {
                    const { ipcRenderer } = window.electron;
                    await Zypo.init();
                    this.i18n = Zypo.getTranslations();
                    
                    ipcRenderer.on('settings-updated', async () => {
                        await Zypo.init();
                        this.i18n = Zypo.getTranslations();
                    });
                },
                t(path) {
                    return Zypo.t(path, this.i18n);
                },
                clearHistory() {
                    this.modal.title = this.t('history.confirm_clear_title');
                    this.modal.desc = this.t('history.confirm_clear');
                    this.modal.open = true;
                },
                executeClear() {
                    window.location.href = 'zb://clear-history';
                    this.modal.open = false;
                },
                formatTime(t) {
                    const d = new Date(t);
                    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
            }
        }
    </script>
</body>
</html>
