<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="zb://dist/tailwind.css">
    <script defer src="zb://dist/alpine.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; position: relative; overflow-x: hidden; }
        .bookmark-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px); }
        .bookmark-card:hover { transform: translateY(-8px); background: #27272a; border-color: #3f3f46; }
        [x-cloak] { display: none !important; }

        /* Background Animation */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #09090b, #000);
        }
        .glow-blob {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(59, 130, 246, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 25s infinite alternate;
        }
        .glow-blob-2 {
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(168, 85, 247, 0) 70%);
            animation: move 35s infinite alternate-reverse;
            top: -100px; right: -100px;
        }
        @keyframes move {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(40%, 40%) scale(1.2); }
        }
    </style>
</head>
<body 
    x-data="newTabData()"
    x-effect="document.title = greeting"
    class="min-h-screen flex flex-col items-center pt-12 px-8"
    @click="contextMenu.open = false"
>
    <!-- Background Elements -->
    <div class="bg-glow">
        <div class="glow-blob"></div>
        <div class="glow-blob glow-blob-2"></div>
    </div>

    <!-- Clock & Date -->
    <div class="flex flex-col items-center mb-12 select-none">
        <div class="text-8xl font-black tracking-tighter text-white/90 drop-shadow-2xl" x-text="time"></div>
        <div class="text-sm font-bold text-zinc-500 uppercase tracking-[0.3em] mt-2" x-text="date"></div>
    </div>

    <h1 class="text-4xl font-black mb-12 tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-zinc-600" x-text="greeting"></h1>

    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 max-w-5xl">
        <template x-for="b in bookmarks" :key="b.url">
            <a 
                :href="b.url" 
                class="bookmark-card group relative flex flex-col items-center justify-center w-36 h-36 bg-zinc-900/50 border border-zinc-800 rounded-[2rem] p-4 text-center no-underline"
                @contextmenu.prevent="openContext($event, b)"
            >
                <div class="w-14 h-14 bg-zinc-800 rounded-2xl flex items-center justify-center text-2xl mb-3 shadow-lg group-hover:bg-zinc-700 transition-colors">
                    <span x-text="getIcon(b)"></span>
                </div>
                <div class="text-sm font-bold text-zinc-300 truncate w-full px-2" x-text="b.title"></div>
                
                <button 
                    @click.prevent.stop="contextMenu.bookmark = b; confirmDelete()"
                    class="absolute -top-2 -right-2 w-8 h-8 bg-red-500/10 border border-red-500/20 text-red-500 rounded-full opacity-0 group-hover:opacity-100 duration-300 active:scale-95 flex items-center justify-center hover:bg-red-500 hover:text-white"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round"></path></svg>
                </button>
            </a>
        </template>
    </div>

    <!-- Unified Context Menu -->
    <div 
        x-show="contextMenu.open" 
        x-cloak
        x-transition.scale.origin.top.left
        class="fixed bg-[#18181b] border border-zinc-800 rounded-2xl shadow-2xl py-1.5 w-48 z-50 overflow-hidden"
        :style="`left: ${contextMenu.x}px; top: ${contextMenu.y}px`"
        @click.stop
    >
        <button @click="openRename()" class="w-full text-left px-4 py-2 hover:bg-zinc-800 flex items-center gap-3 text-sm">
            <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2"></path></svg>
            <span x-text="t('newtab.rename')"></span>
        </button>
        <div class="h-px bg-zinc-800 my-1"></div>
        <button @click="confirmDelete()" class="w-full text-left px-4 py-2 hover:bg-red-500/10 text-red-500 flex items-center gap-3 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"></path></svg>
            <span x-text="t('newtab.delete')"></span>
        </button>
    </div>

    <!-- Unified Modal System -->
    <div 
        x-show="modal.open" 
        x-cloak
        class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm"
        x-transition.opacity
    >
        <div 
            class="bg-[#18181b] border border-zinc-800 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl"
            x-transition.scale
            @click.away="modal.open = false"
        >
            <h3 class="text-2xl font-black mb-2" x-text="modal.title"></h3>
            <p class="text-zinc-500 text-sm mb-6" x-text="modal.desc"></p>
            
            <template x-if="modal.type === 'rename'">
                <input 
                    type="text" 
                    x-model="modal.value" 
                    class="w-full bg-black border border-zinc-800 rounded-2xl px-5 py-3 text-white outline-none focus:border-blue-500 transition-all mb-6"
                    @keydown.enter="saveRename()"
                    autofocus
                >
            </template>

            <div class="flex gap-3">
                <button @click="modal.open = false" class="flex-1 px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-bold duration-300 text-sm text-zinc-300 active:scale-95" x-text="t('newtab.cancel')"></button>
                
                <template x-if="modal.type === 'rename'">
                    <button @click="saveRename()" class="flex-1 px-6 py-3 bg-white text-black hover:bg-zinc-200 rounded-2xl font-bold duration-300 text-sm active:scale-95" x-text="t('newtab.save')"></button>
                </template>
                
                <template x-if="modal.type === 'confirm'">
                    <button @click="executeDelete()" class="flex-1 px-6 py-3 bg-red-600 hover:bg-red-500 text-white rounded-2xl font-bold duration-300 text-sm active:scale-95" x-text="t('newtab.delete')"></button>
                </template>
            </div>
        </div>
    </div>

    <script>
        /*INJECT_BOOKMARKS*/
        window.BOOKMARKS = window.BOOKMARKS || [];

        function newTabData() {
            return {
                bookmarks: window.BOOKMARKS,
                contextMenu: { open: false, x: 0, y: 0, bookmark: null },
                modal: { open: false, type: 'rename', title: '', desc: '', value: '', bookmark: null },
                i18n: {},
                time: '',
                date: '',
                greeting: '',
                
                getIcon(b) {
                    const SYSTEM_ICONS = {
                        'newtab': '✨',
                        'bookmarks': '⭐',
                        'history': '🕒',
                        'downloads': '📥',
                        'settings': '⚙️',
                        'about': 'ℹ️',
                        'wallet': '💰',
                        'network': '📡',
                        'vpn': '🛡️',
                        'domains.zypo': '🌐',
                        'gov.zypo': '🏛️',
                        'docs.zypo': '📚'
                    };
                    
                    const url = b.url.toLowerCase();
                    for (const [key, icon] of Object.entries(SYSTEM_ICONS)) {
                        if (url.includes(key)) return icon;
                    }
                    
                    return b.title.charAt(0).toUpperCase();
                },

                async init() {
                    const { ipcRenderer } = require('electron');
                    await this.loadTranslations();
                    ipcRenderer.on('settings-updated', () => this.loadTranslations());

                    this.updateClock();
                    setInterval(() => this.updateClock(), 1000);
                },

                updateClock() {
                    const now = new Date();
                    const hours = now.getHours();
                    this.time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    
                    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    const lang = (this.i18n.browser && this.i18n.browser.loading === 'Загрузка...') ? 'ru-RU' : 'en-US';
                    this.date = now.toLocaleDateString(lang, options);

                    if (hours >= 5 && hours < 12) this.greeting = this.t('newtab.greet_morning');
                    else if (hours >= 12 && hours < 18) this.greeting = this.t('newtab.greet_afternoon');
                    else if (hours >= 18 && hours < 23) this.greeting = this.t('newtab.greet_evening');
                    else this.greeting = this.t('newtab.greet_night');
                },
                
                async loadTranslations() {
                    const { ipcRenderer } = require('electron');
                    const settings = await ipcRenderer.invoke('get-settings');
                    this.i18n = await ipcRenderer.invoke('get-translations', settings.language);
                },

                t(path) {
                    const keys = path.split('.');
                    let result = this.i18n;
                    for (const key of keys) { result = result ? result[key] : null; }
                    return result || path;
                },
                
                openContext(e, b) {
                    this.contextMenu.open = true;
                    this.contextMenu.x = e.clientX;
                    this.contextMenu.y = e.clientY;
                    this.contextMenu.bookmark = b;
                    if (this.contextMenu.x + 200 > window.innerWidth) this.contextMenu.x -= 200;
                },

                openRename() {
                    this.modal.type = 'rename';
                    this.modal.title = this.t('newtab.modal_title');
                    this.modal.desc = this.t('newtab.modal_desc');
                    this.modal.value = this.contextMenu.bookmark.title;
                    this.modal.bookmark = this.contextMenu.bookmark;
                    this.modal.open = true;
                    this.contextMenu.open = false;
                },

                confirmDelete() {
                    this.modal.type = 'confirm';
                    this.modal.title = this.t('newtab.confirm_delete_title');
                    this.modal.desc = `${this.t('newtab.confirm_delete_desc')} ('${this.contextMenu.bookmark.title}')`;
                    this.modal.bookmark = this.contextMenu.bookmark;
                    this.modal.open = true;
                    this.contextMenu.open = false;
                },

                executeDelete() {
                    window.location.href = `zb://delete-bookmark?url=${encodeURIComponent(this.modal.bookmark.url)}`;
                    this.modal.open = false;
                },

                saveRename() {
                    window.location.href = `zb://rename-bookmark?url=${encodeURIComponent(this.modal.bookmark.url)}&title=${encodeURIComponent(this.modal.value)}`;
                    this.modal.open = false;
                }
            }
        }
    </script>
</body>
</html>
