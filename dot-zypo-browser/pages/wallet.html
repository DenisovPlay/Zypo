<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zypo Wallet</title>
    <link rel="stylesheet" href="zb://dist/tailwind.css">
    <script defer src="zb://dist/alpine.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
        }
        [x-cloak] { display: none !important; }
        
        /* Smooth Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="selection:bg-emerald-500/30">
    <div x-data="walletApp()" x-init="init()" class="h-screen flex flex-col relative overflow-y-auto custom-scroll bg-[#050505] text-white" x-cloak>
        
        <!-- Background Glow -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-emerald-500/10 blur-[120px] rounded-full pointer-events-none z-0"></div>

        <!-- Top Bar -->
        <header class="flex justify-between items-center p-6 shrink-0 z-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl glass flex items-center justify-center text-emerald-500 shadow-inner shadow-emerald-500/20">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                </div>
                <h1 class="text-xl font-semibold tracking-wide" x-text="t('browser.wallet_title') || 'Zypo Wallet'"></h1>
            </div>
            <div class="glass px-4 py-2 rounded-full flex items-center gap-2 cursor-pointer hover:bg-white/10 transition-all duration-300 active:scale-95" @click="copyPeerId()" title="Copy Peer ID">
                <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div>
                <span class="text-sm font-medium font-mono text-zinc-300" x-text="account.peer_id ? account.peer_id.substring(0,6) + '...' + account.peer_id.substring(account.peer_id.length-4) : t('browser.loading')"></span>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="flex-1 px-6 pb-12 z-10 flex flex-col max-w-3xl mx-auto w-full h-full">
            
            <!-- Balance Card -->
            <div class="glass shrink-0 rounded-[2.5rem] p-6 sm:p-8 flex flex-col items-center justify-center relative overflow-hidden mt-4 mb-6 shadow-2xl shadow-black w-full">
                <!-- Inner glow -->
                <div class="absolute -top-12 -right-12 w-48 h-48 bg-emerald-500/20 blur-3xl rounded-full"></div>
                <div class="absolute -bottom-12 -left-12 w-48 h-48 bg-emerald-500/10 blur-3xl rounded-full"></div>
                
                <div class="text-zinc-400 text-xs font-semibold uppercase tracking-widest mb-2 z-10 text-center" x-text="t('browser.wallet_available_balance')"></div>
                <div class="flex flex-col sm:flex-row items-center sm:items-baseline justify-center gap-2 sm:gap-3 mb-8 w-full z-10 px-2">
                    <span class="text-5xl sm:text-6xl md:text-7xl font-semibold tracking-tight text-white truncate max-w-full" x-text="account.balance !== undefined ? account.balance : '--'"></span>
                    <span class="text-emerald-500 font-bold text-xl sm:text-2xl tracking-wide shrink-0">ZPCN</span>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row gap-3 w-full max-w-lg mx-auto z-10">
                    <button @click="modals.send = true" class="flex-1 glass bg-white/5 hover:bg-white/10 py-3 sm:py-4 px-4 rounded-2xl flex items-center justify-center gap-3 transition-all duration-300 active:scale-95 group border-white/10 hover:border-emerald-500/30">
                        <div class="w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-500 flex items-center justify-center group-hover:scale-110 transition-transform shrink-0">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                        </div>
                        <span class="font-semibold text-sm whitespace-nowrap" x-text="t('browser.wallet_send_zpcn') || 'Send'"></span>
                    </button>
                    <button @click="modals.receive = true" class="flex-1 glass bg-white/5 hover:bg-white/10 py-3 sm:py-4 px-4 rounded-2xl flex items-center justify-center gap-3 transition-all duration-300 active:scale-95 group border-white/10 hover:border-blue-500/30">
                        <div class="w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center group-hover:scale-110 transition-transform shrink-0">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 22l10-11M2 22l7-20 4 9 9 4-20 7z" transform="rotate(180 12 12)"/></svg>
                        </div>
                        <span class="font-semibold text-sm whitespace-nowrap" x-text="t('browser.wallet_receive_btn') || 'Receive'"></span>
                    </button>
                </div>
            </div>

            <!-- Stats/Rating -->
            <div class="glass shrink-0 rounded-[2rem] p-5 flex items-center justify-between mb-10">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-amber-500/10 flex items-center justify-center text-amber-500 shadow-inner shadow-amber-500/20">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </div>
                    <div>
                        <div class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase mb-0.5" x-text="t('browser.wallet_network_rating')"></div>
                        <div class="text-lg font-semibold text-white flex items-baseline gap-1">
                            <span x-text="account.rating !== undefined ? account.rating.toFixed(1) : '--'"></span>
                            <span class="text-zinc-600 text-sm font-medium">/ 5.0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- History -->
            <div class="flex items-center justify-between mb-4 px-2">
                <h3 class="text-lg font-semibold" x-text="t('browser.wallet_history')"></h3>
                <button @click="fetchData()" class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-zinc-400 hover:text-white transition-all duration-300 active:scale-95" title="Refresh">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                </button>
            </div>

            <div class="space-y-3">
                <template x-for="t in (account.history || []).slice().reverse()" :key="t.time + t.amount">
                    <div class="glass rounded-2xl p-4 flex items-center justify-between group hover:bg-white/[0.08] transition-colors border-l-4 border-l-transparent"
                         :class="t.from === account.peer_id ? 'hover:border-l-white/50' : 'hover:border-l-emerald-500'">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center shadow-inner"
                                 :class="t.from === account.peer_id ? 'bg-zinc-800 text-zinc-300 shadow-white/5' : 'bg-emerald-500/10 text-emerald-500 shadow-emerald-500/20'">
                                <template x-if="t.from === account.peer_id">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                </template>
                                <template x-if="t.from !== account.peer_id">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                                </template>
                            </div>
                            <div>
                                <div class="text-sm font-semibold text-white mb-0.5" x-text="t.from === account.peer_id ? 'Sent ZPCN' : 'Received ZPCN'"></div>
                                <div class="text-xs text-zinc-500 flex items-center gap-1.5 font-medium">
                                    <span x-text="new Date(t.time).toLocaleDateString()"></span>
                                    <span class="text-zinc-700">•</span>
                                    <span class="font-mono truncate max-w-[120px] md:max-w-[200px]" x-text="t.from === account.peer_id ? t.to : t.from"></span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-base font-bold" :class="t.from === account.peer_id ? 'text-white' : 'text-emerald-400'" x-text="(t.from === account.peer_id ? '-' : '+') + t.amount + ' Z'"></div>
                            <div class="text-xs text-zinc-500 truncate max-w-[120px]" x-text="t.comment || ''" :title="t.comment"></div>
                        </div>
                    </div>
                </template>
                <div x-show="!account.history || account.history.length === 0" class="text-center py-12 glass rounded-[2rem]">
                    <div class="w-16 h-16 rounded-full bg-white/5 text-zinc-600 flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    </div>
                    <div class="text-sm text-zinc-400 font-medium" x-text="t('browser.wallet_history_empty')"></div>
                </div>
            </div>
        </div>

        <!-- Send Modal -->
        <div x-show="modals.send" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200" style="display: none;">
            <div class="glass w-full max-w-md rounded-[2rem] p-8 shadow-2xl relative animate-in zoom-in-95 duration-300" @click.stop>
                <button @click="modals.send = false" class="absolute top-6 right-6 w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-all duration-300 active:scale-95">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
                
                <div class="w-12 h-12 rounded-full bg-emerald-500/20 text-emerald-500 flex items-center justify-center mb-6 shadow-inner shadow-emerald-500/20">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </div>
                
                <h2 class="text-2xl font-bold mb-6 text-white" x-text="t('browser.wallet_send_zpcn') || 'Send ZPCN'"></h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2 block" x-text="t('browser.wallet_recipient_id')"></label>
                        <input type="text" x-model="tx.to" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-emerald-500/50 focus:bg-white/5 transition-all font-mono text-sm text-white placeholder-zinc-700" placeholder="12D3Koo...">
                    </div>
                    
                    <div>
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2 block" x-text="t('browser.wallet_amount')"></label>
                        <div class="relative">
                            <input type="number" x-model="tx.amount" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-emerald-500/50 focus:bg-white/5 transition-all text-white text-lg font-semibold placeholder-zinc-700" placeholder="0">
                            <div class="absolute right-5 top-1/2 -translate-y-1/2 text-emerald-500 font-bold text-sm">ZPCN</div>
                        </div>
                    </div>
                    
                    <div>
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2 block" x-text="t('browser.wallet_comment')"></label>
                        <input type="text" x-model="tx.comment" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-emerald-500/50 focus:bg-white/5 transition-all text-sm text-white placeholder-zinc-700" placeholder="Optional message">
                    </div>
                    
                    <button @click="sendTx()" :disabled="loading" class="w-full bg-white text-black font-semibold text-sm py-4 rounded-2xl mt-4 transition-all duration-300 active:scale-[0.98] disabled:opacity-50 disabled:scale-100 flex items-center justify-center gap-2 hover:bg-zinc-200 shadow-lg shadow-white/10">
                        <span x-show="!loading" x-text="t('browser.wallet_send_button') || 'Send Transaction'"></span>
                        <div x-show="loading" class="w-5 h-5 border-2 border-black/20 border-t-black rounded-full animate-spin" style="display: none;"></div>
                    </button>
                </div>
            </div>
            <!-- Click outside to close -->
            <div class="absolute inset-0 z-[-1]" @click="modals.send = false"></div>
        </div>

        <!-- Receive Modal -->
        <div x-show="modals.receive" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200" style="display: none;">
            <div class="glass w-full max-w-sm rounded-[2rem] p-8 shadow-2xl relative animate-in zoom-in-95 duration-300 text-center" @click.stop>
                <button @click="modals.receive = false" class="absolute top-6 right-6 w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-all duration-300 active:scale-95">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
                
                <div class="w-16 h-16 rounded-full bg-blue-500/10 text-blue-400 flex items-center justify-center mx-auto mb-6 shadow-inner shadow-blue-500/20">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 22l10-11M2 22l7-20 4 9 9 4-20 7z" transform="rotate(180 12 12)"/></svg>
                </div>
                
                <h2 class="text-2xl font-bold mb-2 text-white" x-text="t('browser.wallet_receive_zpcn') || 'Receive ZPCN'"></h2>
                <p class="text-sm text-zinc-400 mb-8" x-text="t('browser.wallet_share_peer_id') || 'Share your Peer ID to receive funds'"></p>
                
                <div class="bg-black/40 border border-white/10 rounded-2xl p-5 mb-8 cursor-pointer hover:border-emerald-500/50 hover:bg-white/5 transition-all duration-300 active:scale-95 group" @click="copyPeerId()">
                    <div class="text-[10px] text-zinc-500 mb-3 uppercase tracking-widest font-bold" x-text="t('browser.wallet_your_peer_id') || 'Your Peer ID'"></div>
                    <div class="font-mono text-sm text-emerald-400 break-all select-all group-hover:text-white transition-colors leading-relaxed" x-text="account.peer_id"></div>
                </div>
                
                <button @click="copyPeerId()" class="w-full glass bg-white/5 hover:bg-white/10 text-white font-semibold text-sm py-4 rounded-2xl transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2 border-white/10 hover:border-white/20">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <span x-text="t('browser.wallet_copy_address') || 'Copy Address'"></span>
                </button>
            </div>
            <div class="absolute inset-0 z-[-1]" @click="modals.receive = false"></div>
        </div>

    </div>

    <script src="zb://js/sdk.js"></script>
    <script>
        function walletApp() {
            return {
                account: {},
                tx: { to: '', amount: '', comment: '' },
                loading: false,
                initialized: false,
                i18n: {},
                modals: { send: false, receive: false },

                async init() {
                    try {
                        try {
                            const electron = window.electron;
                            this._ipc = electron.ipcRenderer;
                        } catch(e) {}

                        if (window.Zypo && window.Zypo._initialized) {
                            await this.onSdkReady();
                        } else {
                            window.addEventListener('zypo-sdk-ready', () => this.onSdkReady());
                            if(window.Zypo) await window.Zypo.init();
                        }
                        
                        setInterval(() => this.fetchData(), 10000);
                        this.initialized = true;
                    } catch (e) {
                        console.error('Failed to initialize wallet page:', e);
                    }
                },

                async onSdkReady() {
                    this.i18n = Zypo.getTranslations();
                    await this.fetchData();
                },

                t(key) {
                    return Zypo.t(key, this.i18n);
                },

                async fetchData() {
                    if(!window.Zypo) return;
                    try {
                        const data = await window.Zypo.getStatus();
                        if (data) {
                            this.account.peer_id = data.peer_id;
                            this.account.balance = data.balance;
                            const prevStatus = this.account.economy_status;
                            this.account.economy_status = data.economy_status;
                            if (data.economy_status === 'offline' && prevStatus === 'synced') {
                                window.Zypo.daemonFetch('/rpc/network/reconnect', { method: 'POST' });
                                this.account.economy_status = 'syncing';
                            }
                            
                            const accRes = await window.Zypo.daemonFetch('/rpc/account');
                            if (accRes.ok) {
                                const accData = await accRes.json();
                                this.account.history = accData.history || [];
                                this.account.rating = accData.rating;
                            }
                        }
                    } catch (e) {}
                },

                async sendTx() {
                    if (!this.tx.to || !this.tx.amount || isNaN(this.tx.amount) || this.tx.amount <= 0) {
                        this.showAlert('Invalid Input', 'Please check the recipient and amount.', 'error');
                        return;
                    }
                    
                    this.loading = true;
                    try {
                        const payload = {
                            to: this.tx.to.trim(),
                            amount: parseInt(this.tx.amount, 10),
                            comment: this.tx.comment.trim()
                        };

                        const res = await window.Zypo.daemonFetch('/rpc/account/transfer', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        const data = await res.json();
                        if (data.success) {
                            this.modals.send = false;
                            this.showAlert('Transfer Successful', 'Your ZPCN has been sent.', 'success');
                            this.tx.to = '';
                            this.tx.amount = '';
                            this.tx.comment = '';
                            await this.fetchData();
                        } else {
                            this.showAlert('Transfer Failed', data.error || 'Check balance or peer ID.', 'error');
                        }
                    } catch (e) {
                        this.showAlert('Network Error', e.message, 'error');
                    } finally {
                        this.loading = false;
                    }
                },

                async copyPeerId() {
                    if(this.account.peer_id) {
                        try {
                            await navigator.clipboard.writeText(this.account.peer_id);
                            this.showAlert('Copied!', 'Peer ID copied to clipboard.', 'success');
                            this.modals.receive = false;
                        } catch(e) {}
                    }
                },

                showAlert(title, message, type) {
                    if(this._ipc) {
                        this._ipc.sendToHost('zypo-alert', title, message, type);
                    } else {
                        alert(title + ": " + message);
                    }
                }
            }
        }
    </script>
</body>
</html>
